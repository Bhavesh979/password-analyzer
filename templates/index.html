<!DOCTYPE html>
<html>

<head>

<title>Password Strength Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Orbitron;
background:black;
color:white;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
margin-top:100px;
}

.card{
background:#0b132b;
padding:40px;
border-radius:12px;
width:400px;
margin:auto;
box-shadow:0 0 20px #00f2ff;
}

input{
padding:10px;
width:60%;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
margin:5px;
background:#00ff9c;
cursor:pointer;
}

.strength-bar{
height:10px;
background:#333;
margin-top:10px;
border-radius:5px;
}

#strength-bar{
height:10px;
width:0%;
border-radius:5px;
}

</style>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="card">

<h1>🔐 Password Strength Analyzer</h1>

<p>Check how strong your password is</p>

<input type="password" id="password">

<button onclick="togglePassword()">Show</button>

<br><br>

<button onclick="analyzePassword()">Analyze Password</button>

<h3>Password Strength: <span id="strength-text">---</span></h3>

<div class="strength-bar">
<div id="strength-bar"></div>
</div>

<h3>Suggestions</h3>
<ul id="suggestions"></ul>

<h3>Suggested Strong Password</h3>
<p id="generated"></p>

<button onclick="copyPassword()">Copy Password</button>
<button onclick="generatePassword()">Generate Password</button>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDVw4hG9i5mWnZ2v4yrRWIUxb_5xa1xyeU",
authDomain: "password-analyzer-3fce2.firebaseapp.com",
projectId: "password-analyzer-3fce2",
storageBucket: "password-analyzer-3fce2.firebasestorage.app",
messagingSenderId: "812083089882",
appId: "1:812083089882:web:56c2bd945c38158ff028d7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

</script>

<script>

function togglePassword(){

let x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}

}

function analyzePassword(){

let password=document.getElementById("password").value;

let score=0;

let suggestions=[];

if(password.length>=8){
score++;
}else{
suggestions.push("Password must be at least 8 characters");
}

if(/[A-Z]/.test(password)){score++;}
else{suggestions.push("Add uppercase letters");}

if(/[0-9]/.test(password)){score++;}
else{suggestions.push("Add numbers");}

if(/[!@#$%^&*]/.test(password)){score++;}
else{suggestions.push("Add special characters");}

let strength="Weak";

let bar=document.getElementById("strength-bar");

if(score<=1){

strength="Weak";
bar.style.width="30%";
bar.style.background="red";

}

else if(score<=3){

strength="Moderate";
bar.style.width="65%";
bar.style.background="orange";

}

else{

strength="Strong";
bar.style.width="100%";
bar.style.background="limegreen";

}

document.getElementById("strength-text").innerText=strength;

let list=document.getElementById("suggestions");
list.innerHTML="";

suggestions.forEach(s=>{
let li=document.createElement("li");
li.innerText=s;
list.appendChild(li);
});

saveToFirebase(strength,password.length);

}

function saveToFirebase(strength,length){

db.collection("password_analysis").add({

strength:strength,
length:length,
time:new Date().toLocaleString()

});

}

function generatePassword(){

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

let pass="";

for(let i=0;i<12;i++){

pass+=chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("generated").innerText=pass;

}

function copyPassword(){

let text=document.getElementById("generated").innerText;

navigator.clipboard.writeText(text);

alert("Password copied");

}

</script>

<script>

var canvas=document.getElementById("matrix");
var ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

var letters="01".split("");

var fontSize=12;

var columns=canvas.width/fontSize;

var drops=[];

for(var x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.1)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
