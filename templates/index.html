<!DOCTYPE html>
<html>

<head>

<title>Password Strength Analyzer</title>

<link rel="stylesheet" href="/static/style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="card">

<h1>🔐 Password Strength Analyzer</h1>

<p>AI-Powered Password Security Analysis</p>

<input type="password" id="password" placeholder="Enter Password">

<button onclick="togglePassword()">Show</button>

<br><br>

<button onclick="analyzePassword()">Analyze Password</button>

<div id="result-section" style="display:none;">

<h3>Password Strength: <span id="strength-text">---</span></h3>

<div class="strength-bar">
<div id="strength-bar"></div>
</div>

<div id="suggestion-section">

<h3>Suggestions</h3>

<ul id="suggestions"></ul>

<h3>Suggested Strong Password</h3>

<p id="generated"></p>

<button onclick="copyGenerated()">Copy Password</button>
<button onclick="generatePassword()">Generate Password</button>

</div>

</div>

</div>

<footer>
<p>Created by Nightmare • Cybersecurity Project</p>
</footer>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDVw4hG9i5mWnZ2v4yrRWIUxb_5xa1xyeU",
authDomain: "password-analyzer-3fce2.firebaseapp.com",
projectId: "password-analyzer-3fce2",
storageBucket: "password-analyzer-3fce2.firebasestorage.app",
messagingSenderId: "812083089882",
appId: "1:812083089882:web:56c2bd945c38158ff028d7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

</script>

<script>

function togglePassword(){

let x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}

}

function analyzePassword(){

document.getElementById("result-section").style.display="block";

let password=document.getElementById("password").value;

let score=0;
let suggestions=[];

let hasUpper=/[A-Z]/.test(password);
let hasLower=/[a-z]/.test(password);
let hasNumber=/[0-9]/.test(password);
let hasSpecial=/[!@#$%^&*]/.test(password);

if(password.length>=8){score++;}
else{suggestions.push("Password must be at least 8 characters.");}

if(hasUpper){score++;}
else{suggestions.push("Add uppercase letters.");}

if(hasLower){score++;}

if(hasNumber){score++;}
else{suggestions.push("Add numbers.");}

if(hasSpecial){score++;}
else{suggestions.push("Add special characters.");}

let strength="Weak";

let text=document.getElementById("strength-text");
let bar=document.getElementById("strength-bar");

if(score<=2){
strength="Weak";
bar.style.width="30%";
bar.style.background="red";
}
else if(score<=4){
strength="Moderate";
bar.style.width="65%";
bar.style.background="orange";
}
else{
strength="Strong";
bar.style.width="100%";
bar.style.background="limegreen";
}

text.innerText=strength;

let list=document.getElementById("suggestions");
list.innerHTML="";

suggestions.forEach(item=>{
let li=document.createElement("li");
li.innerText=item;
list.appendChild(li);
});

saveToFirebase(strength,password.length,score,hasUpper,hasNumber,hasSpecial);

}

function saveToFirebase(strength,length,score,hasUpper,hasNumber,hasSpecial){

const now=new Date();

db.collection("password_analysis").add({

EntryID:"PASS_"+Date.now(),

Strength:strength,
Length:length,
Score:score,
Uppercase:hasUpper,
Numbers:hasNumber,
SpecialChar:hasSpecial,

Time:now.toLocaleString('en-GB'),
Timestamp:now.getTime(),

Device:navigator.userAgent,
Platform:navigator.platform

});

}

function generatePassword(){

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
let password="";

for(let i=0;i<12;i++){
password+=chars.charAt(Math.floor(Math.random()*chars.length));
}

document.getElementById("generated").innerText=password;

}

function copyGenerated(){

let text=document.getElementById("generated").innerText;

navigator.clipboard.writeText(text);

alert("Password copied!");

}

</script>

<script>

var canvas=document.getElementById("matrix");
var ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

var letters="01".split("");
var fontSize=12;
var columns=canvas.width/fontSize;

var drops=[];

for(var x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.1)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
