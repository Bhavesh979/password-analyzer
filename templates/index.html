<!DOCTYPE html>
<html>

<head>

<title>Password Strength Analyzer</title>

<link rel="stylesheet" href="/static/style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="card">

<h1>🔐 Password Strength Analyzer</h1>

<p>Check how strong your password is</p>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button onclick="togglePassword()">Show</button>

<button onclick="analyzePassword()">Analyze Password</button>

<h3>Password Strength: <span id="strength-text">---</span></h3>

<div class="strength-bar">
<div id="strength-bar"></div>
</div>

<h3>Suggestions</h3>
<ul id="suggestions"></ul>

<h3>Suggested Strong Password</h3>
<p id="generated"></p>

<button onclick="copyGenerated()">Copy Password</button>
<button onclick="generatePassword()">Generate Password</button>

</div>

<footer>
<p>Created by Bhavesh Chaudhari • Cybersecurity Project</p>
</footer>

</div>

<!-- Firebase Config -->

<script>

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

</script>

<script>

function togglePassword(){

let x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}

}

function analyzePassword(){

let password=document.getElementById("password").value;

let score=0;
let suggestions=[];

const uppercase=/[A-Z]/.test(password);
const lowercase=/[a-z]/.test(password);
const numbers=/[0-9]/.test(password);
const special=/[!@#$%^&*(),.?":{}|<>]/.test(password);

if(password.length>=8){
score+=20;
}else{
suggestions.push("Password must be at least 8 characters.");
}

if(uppercase){
score+=20;
}else{
suggestions.push("Add uppercase letters.");
}

if(lowercase){
score+=20;
}

if(numbers){
score+=20;
}else{
suggestions.push("Add numbers.");
}

if(special){
score+=20;
}else{
suggestions.push("Add special characters.");
}

let strength="Weak";

let bar=document.getElementById("strength-bar");

if(score<=40){

strength="Weak";
bar.style.width="30%";
bar.style.background="red";

}

else if(score<=80){

strength="Moderate";
bar.style.width="65%";
bar.style.background="orange";

}

else{

strength="Strong";
bar.style.width="100%";
bar.style.background="limegreen";

}

document.getElementById("strength-text").innerText=strength;

let list=document.getElementById("suggestions");
list.innerHTML="";

suggestions.forEach(item=>{
let li=document.createElement("li");
li.innerText=item;
list.appendChild(li);
});

saveAnalysis(password,strength,score,uppercase,lowercase,numbers,special);

}

async function saveAnalysis(password,strength,score,uppercase,lowercase,numbers,special){

let suggestion="Strong password";

if(!special) suggestion="Add special characters";
else if(!numbers) suggestion="Add numbers";
else if(!uppercase) suggestion="Add uppercase letters";

await db.collection("password_analysis").add({

Length: password.length,
Strength: strength,
Uppercase: uppercase,
Lowercase: lowercase,
Numbers: numbers,
SpecialCharacters: special,
Score: score,
Suggestion: suggestion,
Time: new Date().toLocaleString()

});

}

function generatePassword(){

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

let password="";

for(let i=0;i<12;i++){

password+=chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("generated").innerText=password;

}

function copyGenerated(){

let text=document.getElementById("generated").innerText;

navigator.clipboard.writeText(text);

alert("Password copied!");

}

</script>

<script>

var canvas=document.getElementById("matrix");

var ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

var letters="01".split("");

var fontSize=12;

var columns=canvas.width/fontSize;

var drops=[];

for(var x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.1)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
