<!DOCTYPE html>
<html>

<head>

<title>Password Strength Analyzer</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<div class="card">

<h1>🔐 Password Strength Analyzer</h1>

<p class="subtitle">
Analyze password security and generate stronger passwords.
</p>

<form method="POST">

<div class="input-group">

<input 
type="password" 
id="password" 
name="password" 
placeholder="Enter Password"
required
>

<button type="button" onclick="togglePassword()">👁</button>

</div>

<button class="analyze-btn" type="submit">
Analyze Password
</button>

</form>

{% if strength %}

<h2>Password Strength: {{ strength }}</h2>

<h3>Suggestions</h3>

<ul>

{% for item in feedback %}

<li>{{ item }}</li>

{% endfor %}

</ul>

<h3>Suggested Strong Password</h3>

<div class="generated-box">

<p id="generated">{{ suggestion }}</p>

<button onclick="copyPassword()">Copy</button>

</div>

{% endif %}

</div>

</div>

<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}

}

function copyPassword(){

let text=document.getElementById("generated").innerText;

navigator.clipboard.writeText(text);

alert("Password copied!");

}

</script>

</body>

</html>
